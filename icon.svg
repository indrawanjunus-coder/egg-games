<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" shape-rendering="crispEdges">
  <!-- background -->
  <rect width="192" height="192" fill="#f7f7f7"/>
  <!-- frame border (klasik B&W) -->
  <rect x="0" y="0" width="192" height="6" fill="#0f0f0f"/>
  <rect x="0" y="186" width="192" height="6" fill="#0f0f0f"/>
  <rect x="0" y="0" width="6" height="192" fill="#0f0f0f"/>
  <rect x="186" y="0" width="6" height="192" fill="#0f0f0f"/>

  <!-- ground strip bottom -->
  <rect x="0" y="160" width="192" height="32" fill="#4a4a4a"/>
  <rect x="0" y="160" width="192" height="6" fill="#c8c8c8"/>

  <!-- egg body (white with thick black outline, oval shape) -->
  <g transform="translate(96 90)">
    <ellipse cx="0" cy="0" rx="42" ry="54" fill="#ffffff" stroke="#0f0f0f" stroke-width="6"/>
    <!-- eyes -->
    <rect x="-18" y="-12" width="9" height="9" fill="#0f0f0f"/>
    <rect x="9" y="-12" width="9" height="9" fill="#0f0f0f"/>
    <!-- smile (pixel-style) -->
    <rect x="-15" y="12" width="30" height="6" fill="#0f0f0f"/>
    <rect x="-9" y="18" width="18" height="6" fill="#0f0f0f"/>
  </g>
</svg>
